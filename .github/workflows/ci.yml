name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Lint (Biome)
        run: npx biome check . || true
      - name: Security scan
        run: python scripts/security_check.py || true

  build:
    needs: lint-and-type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Prisma generate
        run: npx prisma generate
      - name: Build
        run: npm run build
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET || 'ci-test-secret' }}
          SESSION_SIGNING_KEY: ${{ secrets.SESSION_SIGNING_KEY || 'ci-test-signing-key' }}
          DATABASE_URL: "file:./dev.db"

  test:
    needs: lint-and-type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run tests
        run: npx vitest run --passWithNoTests || true

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate SBOM
        run: python scripts/generate-sbom.py
