services:
  - type: web
    name: aastaclean-portfolio
    runtime: node
    plan: free
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aastaclean-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: ADMIN_SECRET
        sync: false
      - key: SESSION_SIGNING_KEY
        sync: false

  - type: worker
    name: ai-evaluator-worker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/ai_evaluator.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aastaclean-db
          property: connectionString

cronjobs:
  - name: enterprise-seo-audit
    schedule: "0 0 * * *"
    command: python scripts/enterprise_seo_audit.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aastaclean-db
          property: connectionString

databases:
  - name: aastaclean-db
    databaseName: aastaclean_db
    plan: free
