services:
  - type: web
    name: aastaclean-portfolio
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: aastaclean-db
          property: connectionString
      - key: ADMIN_SECRET
        sync: false
      - key: SESSION_SIGNING_KEY
        sync: false
      - key: NEXT_PUBLIC_BASE_URL
        value: https://aastaclean-portfolio.onrender.com

databases:
  - name: aastaclean-db
    databaseName: aastaclean
    plan: free
